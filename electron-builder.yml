appId: dev.focusghost.app
productName: FocusGhost
directories:
  buildResources: resources
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.eslintrc.cjs,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  target:
    - dmg
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Utility
